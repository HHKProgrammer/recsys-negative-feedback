# MovieLens 1M — experiment configuration

dataset:
  name: movielens-1m
  raw_path: data/raw/movielens/ml-1m/ratings.dat
  processed_path: data/processed/movielens/ml-1m/

splits:
  train_file: train.parquet
  train_inner_file: train_inner.parquet
  val_file: val.parquet
  test_file: test.parquet
  user_thresholds_file: user_thresholds.parquet

model:
  name: SVD
  params:
    n_factors: 100
    n_epochs: 20
    lr_all: 0.01
    reg_all: 0.05

negative_feedback:
  # Fixed thresholds: rating <= threshold is negative
  # threshold=1 → {1}; threshold=2 → {1,2}; threshold=3 → {1,2,3}
  fixed_thresholds: [1, 2, 3]
  use_median: true    # negative if rating < user_median
  use_modus: true     # negative if rating < user_mode
  alphas: [0.1, 0.3, 1.0]
  pos_threshold: 4    # positive items must be rated >= this

evaluation:
  k: 10
  n_candidates: 500
  random_seed: 42

random_seed: 42

quick_mode:
  n_candidates: 100
  max_users: 500
  thresholds: [2]
  alphas: [0.3]
  variants: [baseline, filter, rerank]

output:
  base_dir: outputs/movielens/ml-1m/runs/
